# ──────────────────────────────────────────────
# DVC Pipeline — Wildfire RL Data & Model Versioning
# ──────────────────────────────────────────────
# Data Version Control pipeline for reproducible experiments.
#
# Usage:
#   dvc repro          # Run full pipeline
#   dvc push           # Push data/models to remote storage
#   dvc pull           # Pull data/models from remote storage
#   dvc diff           # Compare changes between versions
# ──────────────────────────────────────────────

stages:
  # Stage 1: Train Experiment 1
  train_v1:
    cmd: python train.py --config configs/qlearning_v1.yaml
    deps:
      - train.py
      - sim/wildfire_env.py
      - src/agent.py
      - configs/qlearning_v1.yaml
    outs:
      - models/policy_exp-qlearning-1_final.pkl
    metrics:
      - results/log_exp-qlearning-1.json:
          cache: false
    plots:
      - results/results_exp-qlearning-1.csv:
          x: episode
          y: reward

  # Stage 2: Train Experiment 2
  train_v2:
    cmd: python train.py --config configs/qlearning_v2.yaml
    deps:
      - train.py
      - sim/wildfire_env.py
      - src/agent.py
      - configs/qlearning_v2.yaml
    outs:
      - models/policy_exp-qlearning-2_final.pkl
    metrics:
      - results/log_exp-qlearning-2.json:
          cache: false
    plots:
      - results/results_exp-qlearning-2.csv:
          x: episode
          y: reward

  # Stage 3: Evaluate Experiment 1
  evaluate_v1:
    cmd: python evaluate.py --config configs/qlearning_v1.yaml
    deps:
      - evaluate.py
      - sim/wildfire_env.py
      - src/agent.py
      - models/policy_exp-qlearning-1_final.pkl
      - configs/qlearning_v1.yaml
    metrics:
      - results/evaluation_exp-qlearning-1.json:
          cache: false
    plots:
      - results/reward_curve_exp-qlearning-1.png:
          cache: false
      - results/burned_area_curve_exp-qlearning-1.png:
          cache: false

  # Stage 4: Evaluate Experiment 2
  evaluate_v2:
    cmd: python evaluate.py --config configs/qlearning_v2.yaml
    deps:
      - evaluate.py
      - sim/wildfire_env.py
      - src/agent.py
      - models/policy_exp-qlearning-2_final.pkl
      - configs/qlearning_v2.yaml
    metrics:
      - results/evaluation_exp-qlearning-2.json:
          cache: false
    plots:
      - results/reward_curve_exp-qlearning-2.png:
          cache: false
      - results/burned_area_curve_exp-qlearning-2.png:
          cache: false
