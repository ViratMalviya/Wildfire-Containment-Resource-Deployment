name: ML Pipeline — Train, Evaluate & Register

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"

jobs:
  # ────────────────────────────────────────────
  # Job 1: Lint & Validate
  # ────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools only
        run: |
          pip install --upgrade pip
          pip install flake8 pyyaml

      - name: Lint with flake8
        run: |
          flake8 --max-line-length=120 --ignore=E501,W503,E402,E203 train.py evaluate.py src/ sim/

      - name: Validate YAML configs
        run: |
          python -c "import yaml; yaml.safe_load(open('configs/qlearning_v1.yaml'))"
          python -c "import yaml; yaml.safe_load(open('configs/qlearning_v2.yaml'))"

  # ────────────────────────────────────────────
  # Job 2: Unit Tests
  # ────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PyTorch (CPU-only) first
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-ml
          path: test-results.xml

  # ────────────────────────────────────────────
  # Job 3: Train & Evaluate
  # ────────────────────────────────────────────
  train:
    name: 🏋️ Train & Evaluate
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        config: [configs/qlearning_v1.yaml, configs/qlearning_v2.yaml]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train agent
        run: |
          python train.py --config ${{ matrix.config }}

      - name: Evaluate agent
        run: |
          python evaluate.py --config ${{ matrix.config }}

      - name: Upload results artifacts
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ strategy.job-index }}
          path: |
            results/
            models/
            mlruns/
            mlflow.db

  # ────────────────────────────────────────────
  # Job 4: Docker Build (validate containerisation)
  # ────────────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t wildfire-rl:latest .

      - name: Test Docker container
        run: |
          docker run --rm wildfire-rl:latest python -c "from sim.wildfire_env import WildfireEnv; print('✅ Environment OK')"
