# ──────────────────────────────────────────────
# Docker Compose — Wildfire RL + MLOps Stack
# ──────────────────────────────────────────────
# Services:
#   1. mlflow  — MLflow Tracking Server (UI on port 5000)
#   2. train   — Runs training pipeline
#   3. evaluate — Runs evaluation pipeline
# ──────────────────────────────────────────────

version: "3.8"

services:
  # ── MLflow Tracking Server ──
  mlflow:
    image: python:3.10-slim
    container_name: wildfire-mlflow
    working_dir: /mlflow
    command: >
      bash -c "pip install --quiet mlflow &&
               mlflow server
                 --host 0.0.0.0
                 --port 5000
                 --backend-store-uri sqlite:///mlflow.db
                 --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Training Pipeline ──
  train:
    build: .
    container_name: wildfire-train
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: >
      bash -c "python train.py --config configs/qlearning_v1.yaml &&
               python train.py --config configs/qlearning_v2.yaml"
    volumes:
      - ./results:/app/results
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy

  # ── Evaluation Pipeline ──
  evaluate:
    build: .
    container_name: wildfire-evaluate
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    command: >
      bash -c "python evaluate.py --config configs/qlearning_v1.yaml &&
               python evaluate.py --config configs/qlearning_v2.yaml"
    volumes:
      - ./results:/app/results
      - ./models:/app/models
    depends_on:
      train:
        condition: service_completed_successfully

  # ── FastAPI Backend ──
  api:
    build: .
    container_name: wildfire-api
    ports:
      - "8000:8000"
    command: bash -c "pip install fastapi uvicorn && python api/app.py"
    environment:
      - PYTHONIOENCODING=utf-8
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./api:/app/api
      - ./models:/app/models
      - ./logs:/app/logs
      - ./sim:/app/sim
      - ./src:/app/src

  # ── Frontend Dashboard ──
  frontend:
    image: python:3.10-slim
    container_name: wildfire-frontend
    working_dir: /app/frontend
    command: python -m http.server 8080
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app/frontend

volumes:
  mlflow-data:
